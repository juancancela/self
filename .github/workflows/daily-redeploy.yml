name: Daily Redeploy

on:
  schedule:
    # Run every day at 06:00 UTC (03:00 Argentina time)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
